services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: telo
      POSTGRES_PASSWORD: telo_dev
      POSTGRES_DB: telo_venue_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telo -d telo_venue_assistant"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: